function ShareModal({ dataUrl, onClose, onShare }) {
  const [tab, setTab] = useState("social");
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [copied, setCopied] = useState(false);
  const shareMsg = `🔥 Check out this meme I made on LOLAB! ${SITE_URL}`;
  const socials = [
    { name:"Twitter/X", color:"#1DA1F2", icon:"𝕏", url:`https://twitter.com/intent/tweet?text=${encodeURIComponent("😂 "+shareMsg)}` },
    { name:"Facebook",  color:"#1877F2", icon:"f", url:`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SITE_URL)}` },
    { name:"WhatsApp",  color:"#25D366", icon:"W", url:`https://wa.me/?text=${encodeURIComponent(shareMsg)}` },
    { name:"Reddit",    color:"#FF4500", icon:"R", url:`https://reddit.com/submit?url=${encodeURIComponent(SITE_URL)}` },
    { name:"Telegram",  color:"#229ED9", icon:"✈", url:`https://t.me/share/url?url=${encodeURIComponent(SITE_URL)}&text=${encodeURIComponent(shareMsg)}` },
    { name:"Pinterest", color:"#E60023", icon:"P", url:`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(SITE_URL)}` },
  ];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(8px)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d0d18",border:"1.5px solid #0072ff",borderRadius:20,padding:"28px 24px",maxWidth:460,width:"94%",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 0 80px rgba(0,114,255,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:20,letterSpacing:3,color:"#fff"}}>SHARE ⚡</div>
          <button onClick={onClose} style={{background:"#111",border:"1px solid #222",borderRadius:8,color:"#666",cursor:"pointer",fontSize:16,width:32,height:32}}>✕</button>
        </div>

          <img src={dataUrl} alt="meme" style={{maxHeight:140,objectFit:"contain"}}/>
        </div>
        <div style={{display:"flex",background:"#0a0a14",borderRadius:10,padding:3,marginBottom:16,gap:3}}>
          {[["social","🌐 Social"],["contact","📋 Contact"],["link","🔗 Link"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:13,background:tab===k?"linear-gradient(135deg,#00c6ff,#0072ff)":"transparent",color:tab===k?"#fff":"#444"}}>
              {l}
            </button>
          ))}
        </div>
        {tab==="social"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {socials.map(s=>(
              <a key={s.name} href={s.url} target="_blank" rel="noopener noreferrer" onClick={onShare}
                style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:10,textDecoration:"none",color:"#ccc",fontFamily:"'DM Sans',sans-serif",fontSize:13}}>
                <div style={{width:28,height:28,borderRadius:7,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"#fff",flexShrink:0}}>{s.icon}</div>
                {s.name}
              </a>
            ))}
            <button onClick={()=>{const a=document.createElement("a");a.download="lolab-meme.png";a.href=dataUrl;a.click();onShare();}}
              style={{gridColumn:"1/-1",padding:"10px",background:"#0a0a14",border:"1px dashed #2a2a3a",borderRadius:10,color:"#777",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>
              ⬇ Download image
            </button>
          </div>
        )}
        {tab==="contact"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:12,padding:"14px"}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,letterSpacing:2,color:"#ccc",marginBottom:8}}>📧 EMAIL</div>
              <div style={{display:"flex",gap:8}}>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="friend@email.com" className="inp" style={{flex:1}}/>
                <button onClick={()=>{if(!email)return;window.location.href=`mailto:${email}?subject=Check out this meme!&body=${encodeURIComponent(shareMsg)}`;onShare();}}
                  style={{background:"linear-gradient(135deg,#00c6ff,#0072ff)",border:"none",borderRadius:8,padding:"9px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:13,color:"#fff",cursor:"pointer"}}>SEND</button>
              </div>
            </div>
            <div style={{background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:12,padding:"14px"}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,letterSpacing:2,color:"#ccc",marginBottom:8}}>💬 SMS</div>
              <div style={{display:"flex",gap:8}}>
                <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1 555 000 0000" className="inp" style={{flex:1}}/>
                <button onClick={()=>{if(!phone)return;window.location.href=`sms:${phone}?body=${encodeURIComponent(shareMsg)}`;onShare();}}
                  style={{background:"linear-gradient(135deg,#25D366,#128C7E)",border:"none",borderRadius:8,padding:"9px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:13,color:"#fff",cursor:"pointer"}}>SEND</button>
              </div>
            </div>
          </div>
        )}
        {tab==="link"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:"#0a0a14",border:"1px solid #1a1a2a",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>

              <button onClick={()=>{try{navigator.share({title:"LOLAB Meme Generator",text:shareMsg,url:SITE_URL}).then(onShare).catch(()=>{});}catch(e){}}}

              </button>
            )}

}

function App() {
  const canvasRef    = useRef(null);
  const fileInputRef = useRef(null);
  const [imgObj,      setImgObj]      = useState(null);
  const [texts,       setTexts]       = useState([
    {id:1,content:"TOP TEXT",   fontSize:36,color:"#ffffff",x:50,y:8},
    {id:2,content:"BOTTOM TEXT",fontSize:36,color:"#ffffff",x:50,y:88},
  ]);
  const [selectedId,  setSelectedId]  = useState(1);
  const [dragging,    setDragging]    = useState(null);
  const [tab,         setTab]         = useState("templates");
  const [downloaded,  setDownloaded]  = useState(false);
  const [memeCount,   setMemeCount]   = useState(0);
  const [showPaywall, setShowPaywall] = useState(false);
  const [showShare,   setShowShare]   = useState(false);
  const [shareData,   setShareData]   = useState(null);
  const [adBonus,     setAdBonus]     = useState(0);
  const [adRewarded,  setAdRewarded]  = useState(false);

  const totalLimit = FREE_LIMIT + adBonus;
  const remaining  = Math.max(0, totalLimit - memeCount);
  const sel        = texts.find(t=>t.id===selectedId);

  const loadImage = useCallback((src)=>{
    const img=new Image(); img.crossOrigin="anonymous";
    img.onload=()=>setImgObj(img); img.src=src;
  },[]);

  useEffect(()=>{ loadImage(TEMPLATES[0].url); },[loadImage]);

  const draw = useCallback(()=>{
    const c=canvasRef.current; if(!c||!imgObj)return;
    const ctx=c.getContext("2d"),W=c.width,H=c.height;
    ctx.clearRect(0,0,W,H);
    const r=Math.min(W/imgObj.width,H/imgObj.height);
    ctx.drawImage(imgObj,(W-imgObj.width*r)/2,(H-imgObj.height*r)/2,imgObj.width*r,imgObj.height*r);
    texts.forEach(t=>{
      const fs=t.fontSize;
      ctx.font=`900 ${fs}px Impact,Arial Black,sans-serif`;
      ctx.textAlign="center"; ctx.lineWidth=fs/8;
      ctx.strokeStyle="rgba(0,0,0,0.9)"; ctx.fillStyle=t.color;
      ctx.strokeText(t.content,(t.x/100)*W,(t.y/100)*H+fs*0.35);
      ctx.fillText(t.content,(t.x/100)*W,(t.y/100)*H+fs*0.35);
    });
    ctx.font="bold 13px Rajdhani,sans-serif";
    ctx.fillStyle="rgba(0,198,255,0.3)";
    ctx.textAlign="right";
    ctx.fillText("LOLAB.APP",W-10,H-10);
  },[imgObj,texts]);

  useEffect(()=>{ draw(); },[draw]);

  const handleFile=(e)=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=ev=>loadImage(ev.target.result); r.readAsDataURL(f);
    setTab("edit");
  };

  const onDown=(e)=>{
    const rect=canvasRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const mx=((clientX-rect.left)/rect.width)*100;
    const my=((clientY-rect.top)/rect.height)*100;
    let found=null;
    texts.forEach(t=>{if(Math.abs(t.x-mx)<20&&Math.abs(t.y-my)<8)found=t.id;});
    if(found){setSelectedId(found);setDragging(found);}
  };
  const onMove=(e)=>{
    if(!dragging)return;
    e.preventDefault();
    const rect=canvasRef.current.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const mx=Math.max(5,Math.min(95,((clientX-rect.left)/rect.width)*100));
    const my=Math.max(2,Math.min(98,((clientY-rect.top)/rect.height)*100));
    setTexts(p=>p.map(t=>t.id===dragging?{...t,x:mx,y:my}:t));
  };
  const onUp=()=>setDragging(null);
  const upd=(field,val)=>setTexts(p=>p.map(t=>t.id===selectedId?{...t,[field]:val}:t));
  const getDataUrl=()=>canvasRef.current?.toDataURL("image/png");

  const download=()=>{
    if(memeCount>=totalLimit){setShowPaywall(true);return;}
    const a=document.createElement("a"); a.download="lolab-meme.png"; a.href=getDataUrl(); a.click();
    setMemeCount(n=>n+1); setDownloaded(true); setTimeout(()=>setDownloaded(false),2000);
  };
  const openShare=()=>{
    if(memeCount>=totalLimit){setShowPaywall(true);return;}
    setShareData(getDataUrl()); setShowShare(true);
  };
  const watchAd=()=>{
    try{
      const w=window.open("","_blank","width=400,height=300");
      if(w){
        w.document.write(`<html><body style="background:#000;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;"><p style="color:#888;font-size:13px;margin-bottom:12px">Advertisement</p><ins class="adsbygoogle" style="display:block;width:300px;height:250px" data-ad-client="${ADMOB_CLIENT}" data-ad-slot="${ADMOB_SLOT}"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});<\/script><p style="margin-top:20px;font-size:14px;color:#aaa">Closing in <span id="t">5</span>s</p><script>let n=5;setInterval(()=>{n--;document.getElementById('t').textContent=n;if(n<=0)window.close();},1000);<\/script></body></html>`);
        w.document.close();
        setTimeout(()=>{setAdBonus(b=>b+REWARD_BONUS);setAdRewarded(true);setTimeout(()=>setAdRewarded(false),3000);},5500);
      } else { setAdBonus(b=>b+REWARD_BONUS);setAdRewarded(true);setTimeout(()=>setAdRewarded(false),3000); }
    }catch(e){ setAdBonus(b=>b+REWARD_BONUS);setAdRewarded(true);setTimeout(()=>setAdRewarded(false),3000); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#07070f",fontFamily:"'Rajdhani',sans-serif",color:"#f0f0f0",display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:70}}>

      {/* Header */}
      <div style={{width:"100%",background:"#09090f",borderBottom:"1.5px solid #0072ff",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>⚡</span>
          <div>
            <div style={{fontSize:20,letterSpacing:5,fontWeight:700,background:"linear-gradient(90deg,#00c6ff,#0072ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LOLAB</div>
            <div style={{fontSize:9,letterSpacing:3,color:"#333",fontFamily:"'DM Sans',sans-serif",marginTop:-2}}>MEME GENERATOR</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:remaining===0?"#ff4444":"#333"}}>{remaining} free</span>
          <button onClick={()=>setShowPaywall(true)} style={{background:"linear-gradient(135deg,#00c6ff,#0072ff)",border:"none",borderRadius:8,padding:"7px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,color:"#fff",cursor:"pointer"}}>GO PRO ⚡</button>
        </div>
      </div>

      <div style={{width:"100%",maxWidth:1080,padding:"0 12px",display:"flex",flexDirection:"column",gap:14}}>

        {/* Canvas */}
        <div style={{display:"flex",justifyContent:"center"}}>
          <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #111820",boxShadow:"0 0 40px rgba(0,114,255,0.1)"}}>
            <canvas ref={canvasRef} width={500} height={500}
              onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
              onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
              style={{maxWidth:"100%",touchAction:"none"}}/>
          </div>
        </div>

        {/* Buttons */}
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button className={`dl${downloaded?" done":""}`} onClick={download} style={{background:downloaded?"linear-gradient(135deg,#22c55e,#16a34a)":"linear-gradient(135deg,#00c6ff,#0072ff)",border:"none",borderRadius:10,padding:"12px 28px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:18,letterSpacing:2,color:"#fff",cursor:"pointer"}}>
            {downloaded?"✓ SAVED!":"⬇ DOWNLOAD"}
          </button>
          <button className="sh" onClick={openShare}>🔗 SHARE</button>
        </div>

        {adRewarded&&(
          <div style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",borderRadius:10,padding:"10px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,letterSpacing:2,color:"#fff",textAlign:"center"}}>
            ✅ +{REWARD_BONUS} FREE MEMES UNLOCKED!
          </div>
        )}

        {remaining===0&&(
          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={watchAd} style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:8,padding:"10px 18px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,letterSpacing:2,color:"#fff",cursor:"pointer"}}>
              📺 WATCH AD — GET {REWARD_BONUS} FREE
            </button>
            <button onClick={()=>setShowPaywall(true)} style={{background:"transparent",border:"1.5px solid #0072ff",borderRadius:8,padding:"10px 18px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,letterSpacing:2,color:"#00c6ff",cursor:"pointer"}}>
              ⚡ GO PRO
            </button>
          </div>
        )}

        {remaining>0&&(
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#2a2a3a",textAlign:"center"}}>
            {remaining} free left · <span style={{color:"#0072ff",cursor:"pointer"}} onClick={()=>setShowPaywall(true)}>Go Pro for unlimited ⚡</span>
          </div>
        )}

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #111"}}>
          {["templates","upload","edit"].map(t=>(
            <button key={t} className={`tab${tab===t?" on":""}`} onClick={()=>setTab(t)}>
              {t==="templates"?"🖼 Templates":t==="upload"?"📤 Upload":"✏️ Edit"}
            </button>
          ))}
        </div>

        {/* Templates */}
        {tab==="templates"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>
            {TEMPLATES.map(tpl=>(
              <div key={tpl.name} className="tcard" onClick={()=>{loadImage(tpl.url);setTab("edit");}}>
                <img src={tpl.url} alt={tpl.name} crossOrigin="anonymous"/>
                <span>{tpl.name}</span>
              </div>
            ))}
          </div>
        )}

        {/* Upload */}
        {tab==="upload"&&(
          <div onClick={()=>fileInputRef.current.click()} style={{border:"2px dashed #1a2030",borderRadius:12,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:"#090910"}}>
            <div style={{fontSize:36,marginBottom:8}}>📁</div>
            <div style={{fontSize:16,letterSpacing:3,color:"#00c6ff",fontWeight:700}}>CHOOSE IMAGE</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#333",marginTop:4}}>PNG · JPG · GIF</div>
            <input ref={fileInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
          </div>
        )}

        {/* Edit */}
        {tab==="edit"&&(
          !sel ? (
            <div style={{textAlign:"center",padding:"20px",fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#444"}}>
              No text layers. <button className="addbtn" onClick={()=>{const id=Date.now();setTexts(p=>[...p,{id,content:"NEW TEXT",fontSize:36,color:"#ffffff",x:50,y:50}]);setSelectedId(id);}}>+ Add Layer</button>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Layers</div>
                {texts.map(t=>(
                  <div key={t.id} className={`lbtn${t.id===selectedId?" on":""}`} style={{marginBottom:5}} onClick={()=>setSelectedId(t.id)}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80%"}}>{t.content||"(empty)"}</span>
                    <button onClick={e=>{e.stopPropagation();setTexts(p=>{const n=p.filter(x=>x.id!==t.id);if(t.id===selectedId&&n.length)setSelectedId(n[0].id);return n;});}} style={{background:"none",border:"none",color:"#0072ff",cursor:"pointer",fontSize:14}}>✕</button>
                  </div>
                ))}
                <button className="addbtn" onClick={()=>{const id=Date.now();setTexts(p=>[...p,{id,content:"NEW TEXT",fontSize:36,color:"#ffffff",x:50,y:50}]);setSelectedId(id);}}>+ Add Layer</button>
              </div>
              <div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Text</div>
                <input className="inp" value={sel.content} onChange={e=>upd("content",e.target.value)} placeholder="Your meme text..."/>
              </div>
              <div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Size — {sel.fontSize}px</div>
                <input type="range" min={12} max={100} value={sel.fontSize} onChange={e=>upd("fontSize",Number(e.target.value))}/>
              </div>
              <div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Color</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                  {["#ffffff","#000000","#00c6ff","#ffdd00","#ff3b3b","#b8ff3b","#ff69b4"].map(c=>(
                    <div key={c} onClick={()=>upd("color",c)} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:sel.color===c?"3px solid #00c6ff":"2px solid #1a1a2a"}}/>
                  ))}
                  <input type="color" value={sel.color} onChange={e=>upd("color",e.target.value)} style={{width:26,height:26,border:"none",borderRadius:"50%",cursor:"pointer",padding:0}}/>
                </div>
              </div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#2a2a3a",background:"#09090f",borderRadius:6,padding:"7px 10px"}}>
                ⚡ Touch & drag text on the canvas to move it
              </div>
            </div>
          )
        )}
      </div>

      {showPaywall&&<PaywallModal onClose={()=>setShowPaywall(false)}/>}
      {showShare&&shareData&&<ShareModal dataUrl={shareData} onClose={()=>setShowShare(false)} onShare={()=>setMemeCount(n=>n+1)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
