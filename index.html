<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>LOLAB Meme Generator</title>
    <meta name="description" content="Create, customize and share hilarious memes in seconds. Free meme maker with templates, drag text, custom colors and one-click sharing." />
    <meta name="keywords" content="meme generator, meme maker, free memes, create memes, lolab" />
    <meta name="author" content="LOLAB" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0072ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LOLAB" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lolab.app/" />
    <meta property="og:title" content="LOLAB Meme Generator" />
    <meta property="og:description" content="Create hilarious memes in seconds. Free templates, custom text, one-click sharing." />
    <meta property="og:image" content="https://lolab.app/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LOLAB Meme Generator" />
    <meta name="twitter:description" content="Create hilarious memes in seconds. Free!" />
    <meta name="twitter:image" content="https://lolab.app/icons/icon-512x512.png" />

    <!-- Google AdMob / AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-3382071605271904" crossorigin="anonymous"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #07070f; padding-bottom: 60px; }
      #root { min-height: 100vh; }
      .admob-banner {
        display: block;
        width: 100%;
        background: #0a0a14;
        border-top: 1px solid #1a1a2a;
        text-align: center;
        min-height: 50px;
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- AdMob Banner Ad (fixed bottom) -->
    <div class="admob-banner">
      <ins class="adsbygoogle"
        style="display:inline-block;width:320px;height:50px"
        data-ad-client="ca-app-pub-3382071605271904"
        data-ad-slot="7688714176"
        data-ad-format="banner">
      </ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- Register Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => console.log("SW registered:", reg.scope))
            .catch((err) => console.log("SW failed:", err));
        });
      }
    </script>
  </body>
</html>
